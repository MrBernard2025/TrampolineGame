<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trampoline Trick Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="Game information">
      <div class="hud-card">
        <span class="hud-label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-card">
        <span class="hud-label">Best</span>
        <strong id="best-score">0</strong>
      </div>
      <div class="hud-card">
        <span class="hud-label">Combo</span>
        <strong id="combo">0</strong>
      </div>
      <div class="hud-card hud-card-wide">
        <span class="hud-label">Landing</span>
        <strong id="feedback">Press Space to start</strong>
      </div>
    </section>

    <canvas id="game" width="960" height="540" aria-label="Trampoline trick game"></canvas>

    <section class="controls-panel">
      <p><strong>Space</strong> start run | <strong>Q</strong> front flip | <strong>E</strong> backflip | <strong>Arrow keys / A D</strong> move | <strong>R</strong> restart</p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
