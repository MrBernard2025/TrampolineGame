<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trampoline Trick Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud" aria-label="Game information">
      <div class="hud-card">
        <span class="hud-label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-card">
        <span class="hud-label">Best</span>
        <strong id="best-score">0</strong>
      </div>
      <div class="hud-card">
        <span class="hud-label">Combo</span>
        <strong id="combo">0</strong>
      </div>
      <div class="hud-card hud-card-wide">
        <span class="hud-label">Landing</span>
        <strong id="feedback">Press Space to start</strong>
      </div>
    </section>

    <canvas id="game" width="960" height="540" aria-label="Trampoline trick game"></canvas>

    <section class="touch-controls" aria-label="Touch controls">
      <button id="btn-left" class="touch-btn touch-btn-move" type="button">Left</button>
      <button id="btn-start" class="touch-btn touch-btn-main" type="button">Start / Jump</button>
      <button id="btn-right" class="touch-btn touch-btn-move" type="button">Right</button>
      <button id="btn-front" class="touch-btn touch-btn-flip" type="button">Front Flip</button>
      <button id="btn-restart" class="touch-btn touch-btn-main" type="button">Restart</button>
      <button id="btn-back" class="touch-btn touch-btn-flip" type="button">Back Flip</button>
    </section>

    <section class="controls-panel">
      <p><strong>Keyboard:</strong> Space start run | Q front flip | E backflip | Arrow keys / A D move | R restart</p>
      <p><strong>Touch:</strong> Use on-screen buttons for move, flip, start, and restart.</p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
